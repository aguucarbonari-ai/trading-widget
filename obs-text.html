<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Text Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            overflow: hidden;
        }
        #text {
            white-space: pre-line;
            text-align: center;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div id="text"></div>
    <script>
        const params = new URLSearchParams(window.location.search);

        const gistId = params.get('gist');
        const gistFile = params.get('gf_name') || null;
        const pollInterval = parseInt(params.get('poll') || '5', 10) * 1000;

        const DEFAULTS = {
            text: 'Hello World',
            fs: '48',
            ff: 'Arial, sans-serif',
            c: '#ffffff',
            bg: 'transparent',
            fw: 'bold',
            s: '2px 2px 4px rgba(0,0,0,0.5)',
            a: 'center',
            o: '',
            p: '10',
            ls: '',
            lh: '',
            upper: false,
            italic: false,
            gf: ''
        };

        const el = document.getElementById('text');
        let loadedGoogleFont = '';

        function parseColor(val) {
            if (!val) return '';
            return val.startsWith('#') ? val : '#' + val;
        }

        function applyConfig(cfg) {
            const c = Object.assign({}, DEFAULTS, cfg);

            // Background
            const bgVal = c.bg === 'transparent' ? 'transparent' : parseColor(c.bg);
            document.body.style.backgroundColor = bgVal;

            // Text
            el.textContent = (c.text || c.t || '').replace(/\\n/g, '\n');

            // Google Font
            if (c.gf && c.gf !== loadedGoogleFont) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(c.gf) + ':wght@400;700;900&display=swap';
                document.head.appendChild(link);
                loadedGoogleFont = c.gf;
            }

            // Typography
            el.style.fontSize = c.fs + 'px';
            el.style.fontFamily = c.gf ? ('"' + c.gf + '", ' + c.ff) : c.ff;
            el.style.color = parseColor(c.c);
            el.style.fontWeight = c.fw;
            el.style.textAlign = c.a;

            // Effects
            el.style.textShadow = c.s || 'none';
            el.style.webkitTextStroke = c.o ? ('1px ' + parseColor(c.o)) : '';
            el.style.padding = c.p ? (c.p + 'px') : '0';
            el.style.letterSpacing = c.ls ? (c.ls + 'px') : '';
            el.style.lineHeight = c.lh || '';
            el.style.textTransform = c.upper ? 'uppercase' : '';
            el.style.fontStyle = c.italic ? 'italic' : '';
        }

        if (gistId) {
            async function fetchGist() {
                try {
                    const res = await fetch('https://api.github.com/gists/' + gistId + '?_=' + Date.now());
                    const data = await res.json();
                    const files = data.files;
                    const file = gistFile ? files[gistFile] : files[Object.keys(files)[0]];
                    const content = file.content;

                    try {
                        const json = JSON.parse(content);
                        applyConfig(json);
                    } catch {
                        applyConfig({ text: content.trim() });
                    }
                } catch (e) {
                    console.error('Error fetching gist:', e);
                }
            }

            fetchGist();
            setInterval(fetchGist, pollInterval);
        } else {
            // Static mode: all config from URL params
            applyConfig({
                text: params.get('t') || params.get('text') || DEFAULTS.text,
                fs: params.get('fs') || params.get('fontsize') || DEFAULTS.fs,
                ff: params.get('ff') || params.get('font') || DEFAULTS.ff,
                c: params.get('c') || params.get('color') || DEFAULTS.c,
                bg: params.get('bg') || params.get('background') || DEFAULTS.bg,
                fw: params.get('fw') || params.get('weight') || DEFAULTS.fw,
                s: params.get('s') || params.get('shadow') || DEFAULTS.s,
                a: params.get('a') || params.get('align') || DEFAULTS.a,
                o: params.get('o') || params.get('outline') || '',
                p: params.get('p') || params.get('padding') || DEFAULTS.p,
                ls: params.get('ls') || params.get('spacing') || '',
                lh: params.get('lh') || params.get('lineheight') || '',
                upper: params.has('upper'),
                italic: params.has('italic'),
                gf: params.get('gf') || params.get('googlefont') || ''
            });
        }
    </script>
</body>
</html>
